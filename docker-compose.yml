services:
  # --- BANCO DE DADOS POSTGRES ---
  db:
    image: postgres:16-alpine
    container_name: mas_postgres_db_lab
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BACKEND NESTJS ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mas_nestjs_backend_lab
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_TYPE: ${DB_TYPE}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      PORT: ${BACKEND_PORT}
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # --- FRONTEND ANGULAR ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mas_angular_frontend_lab
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      API_URL: http://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network
# --- BANCO DE DADOS MYSQL (WORDPRESS HEADLESS) ---
  wp_db:
    image: mysql:8.0
    container_name: mvp_mysql_wp_db_lab
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_DATABASE: ${WP_DB_NAME}
      MYSQL_USER: ${WP_DB_USER}
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network # Mude para o nome da rede que já existe no seu MVP
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- HEADLESS WORDPRESS ---
  wordpress:
    image: wordpress:latest
    container_name: mvp_wordpress_lab
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      WORDPRESS_DB_HOST: wp_db:3306
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DEBUG: 1 
    ports:
      - "${WP_PORT}:80"
    volumes:
      - ./wp:/var/www/html
    depends_on:
      wp_db:
        condition: service_healthy
    networks:
      - app-network # Mude para o nome da rede que já existe no seu MVP

# --- GERENCIAMENTO DE VOLUMES ---
volumes:
  pgdata:
  mysql_data:

networks:
  app-network:
    driver: bridge
