<mat-card class="arena-result-card" *ngIf="resultData">
  
  <mat-card-header>
    <div mat-card-avatar class="winner-icon">🏆</div>
    <mat-card-title>Vencedor: {{ winner?.nome }}</mat-card-title>
    <mat-card-subtitle>
      Saldo Final: {{ winner?.saldoFinal | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="chart-section">
    <app-arena-investments-mini-chart [perfis]="resultData.perfis"></app-arena-investments-mini-chart>
  </mat-card-content>

  <mat-card-content class="profiles-grid">
    <mat-card class="profile-card" *ngFor="let perfil of resultData.perfis">
      <div class="profile-name">{{ perfil.nome }}</div>
      <div class="profile-value">{{ perfil.saldoFinal | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</div>
      <div class="profile-rate">Taxa mensal: {{ perfil.taxaMensal | number:'1.2-2':'pt-BR' }}%</div>
    </mat-card>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-stroked-button color="primary" (click)="openDetailedModal()">
      <mat-icon>analytics</mat-icon>
      Ver Análise Detalhada
    </button>
  </mat-card-actions>
  
</mat-card>
